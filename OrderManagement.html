        </div>
      </div>
    </div>

<script>
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatYmdHmForDashboard(value) {
      if (!value) return '-';
      var d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      var y = d.getFullYear();
      var mo = ('0' + (d.getMonth() + 1)).slice(-2);
      var da = ('0' + d.getDate()).slice(-2);
      var hh = ('0' + d.getHours()).slice(-2);
      var mm = ('0' + d.getMinutes()).slice(-2);
      return y + '-' + mo + '-' + da + ' ' + hh + ':' + mm;
    }

    function clampPercent(v) {
      var n = Number(v);
      if (isNaN(n)) return 0;
      if (n < 0) return 0;
      if (n > 100) return 100;
      return Math.round(n);
    }

    /** 'percent' | 'qty' — 진행률 바 클릭 시 전환 */
    var dashboardProgressLabelMode = 'percent';

    function formatProgressLabel(mode, pct, done, target) {
      if (mode === 'qty') {
        var d = Math.max(0, Math.floor(Number(done) || 0));
        var t = Math.max(0, Math.floor(Number(target) || 0));
        if (t > 0) return d + ' / ' + t;
        return String(d);
      }
      return clampPercent(pct) + '%';
    }

    function progressBarHtml(pct, type, mode, done, target) {
      var p = clampPercent(pct);
      var label = formatProgressLabel(mode, pct, done, target);
      var tip = mode === 'qty' ? '클릭하여 진행률(%) 표시' : '클릭하여 수량(완료/목표) 표시';
      return (
        '<div class="progress-cell js-progress-toggle" role="button" tabindex="0" title="' + escapeHtml(tip) + '">' +
          '<div class="bar-track"><div class="bar-fill ' + escapeHtml(type) + '" style="width:' + p + '%;"></div></div>' +
          '<div class="bar-label ' + escapeHtml(type) + '-label">' + escapeHtml(label) + '</div>' +
        '</div>'
      );
    }

    function rerenderOrderTableKeepingPage() {
      var root = document.getElementById('dashboardTableWrap');
      if (!root || !dashboardCurrentRows.length) return;
      root.innerHTML = renderOrderProgressTable(dashboardCurrentRows);
    }

    function dashboardRowKeyForDataAttr(or) {
      var o = or || {};
      var rk =
        o.rowKey != null && String(o.rowKey).trim() !== ''
          ? String(o.rowKey).trim()
          : String(o.orderNumber != null ? o.orderNumber : '').trim() +
            '\x1f' +
            String(o.productName != null ? o.productName : '').trim() +
            '\x1f' +
            String(o.productCode != null ? o.productCode : '').trim();
      return encodeURIComponent(rk);
    }

    var lastOrderTableSignature = '';
    var dashboardCurrentRows = [];
    var dashboardCustomerFilter = '';
    var dashboardHideCompleted = true;
    var dashboardPage = 1;
    var dashboardPageSize = 10;
    var dashboardTotalRows = 0;
    var dashboardTotalPages = 1;
    var dashboardLoadToken = 0;
    var DASHBOARD_CLIENT_CACHE_KEY = 'orderDashboardPage_v5';
    var DASHBOARD_CLIENT_CACHE_TTL_MS = 90000;

    function dashboardLoadOptions_(pageOverride) {
      return {
        page: pageOverride != null ? pageOverride : dashboardPage,
        pageSize: dashboardPageSize,
        customer: dashboardCustomerFilter || '',
        hideCompleted: dashboardHideCompleted
      };
    }

    function dashboardClientCacheKey_(opts) {
      opts = opts || {};
      return [
        String(opts.page || 1),
        String(opts.pageSize || 10),
        String(opts.customer || ''),
        opts.hideCompleted === false ? '0' : '1'
      ].join('|');
    }

    function readDashboardClientCache_(opts) {
      try {
        var raw = sessionStorage.getItem(DASHBOARD_CLIENT_CACHE_KEY);
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        if (!parsed || !parsed.res || !parsed.savedAt) return null;
        if (Date.now() - Number(parsed.savedAt) > DASHBOARD_CLIENT_CACHE_TTL_MS) return null;
        if (parsed.key !== dashboardClientCacheKey_(opts)) return null;
        return parsed.res;
      } catch (e) {
        return null;
      }
    }

    function writeDashboardClientCache_(opts, res) {
      try {
        sessionStorage.setItem(
          DASHBOARD_CLIENT_CACHE_KEY,
          JSON.stringify({ key: dashboardClientCacheKey_(opts), res: res, savedAt: Date.now() })
        );
      } catch (e2) {}
    }

    function clearDashboardClientCache_() {
      try {
        sessionStorage.removeItem(DASHBOARD_CLIENT_CACHE_KEY);
      } catch (eClr) {}
    }

    function buildCustomerFilterOptions(customers) {
      var sel = document.getElementById('customerFilterSelect');
      var bar = document.getElementById('orderFilterBar');
      if (!sel || !bar) return;
      var prev = sel.value || '';
      var names = Array.isArray(customers) ? customers.slice() : [];
      sel.innerHTML = '<option value="">전체</option>';
      for (var j = 0; j < names.length; j++) {
        var opt = document.createElement('option');
        opt.value = names[j];
        opt.textContent = names[j];
        sel.appendChild(opt);
      }
      if (prev === '' || names.indexOf(prev) >= 0) {
        sel.value = prev;
        dashboardCustomerFilter = prev;
      } else {
        sel.value = '';
        dashboardCustomerFilter = '';
      }
      bar.style.display = 'flex';
    }

    function updateOrderFilterHint_(res) {
      var hint = document.getElementById('orderFilterHint');
      if (!hint || !res) return;
      var parts = [];
      if (res.hideCompleted !== false && (res.completedHiddenCount || 0) > 0) {
        parts.push('완료 ' + res.completedHiddenCount + '건 숨김');
      }
      if (res.totalRows != null) parts.push('표시 ' + res.totalRows + '건');
      hint.textContent = parts.join(' · ');
    }

    function applyDashboardPageResponse_(res, opts) {
      opts = opts || {};
      var root = document.getElementById('dashboardTableWrap');
      var upd = document.getElementById('progressUpdatedAt');
      if (!root || !upd || !res) return;
      dashboardCurrentRows = Array.isArray(res.rows) ? res.rows.slice() : [];
      dashboardPage = res.page || 1;
      dashboardTotalRows = res.totalRows != null ? res.totalRows : dashboardCurrentRows.length;
      dashboardTotalPages = res.totalPages || 1;
      dashboardHideCompleted = res.hideCompleted !== false;
      buildCustomerFilterOptions(res.customers || []);
      updateOrderFilterHint_(res);
      var showCompletedEl = document.getElementById('showCompletedOrders');
      if (showCompletedEl) showCompletedEl.checked = !dashboardHideCompleted;
      var sig = dashboardClientCacheKey_(opts) + ':' + (res.updatedAt || '');
      if (!dashboardCurrentRows.length) {
        root.innerHTML =
          dashboardTotalRows === 0 && dashboardCustomerFilter
            ? '<div class="loading">선택한 고객사에 해당하는 주문이 없습니다.</div>'
            : '<div class="loading">표시할 주문(제품) 행이 없습니다.</div>';
        lastOrderTableSignature = sig;
        updatePager(0);
      } else if (opts.forceRender || sig !== lastOrderTableSignature || !updateOrderProgressBarsOnly(dashboardCurrentRows)) {
        root.innerHTML = renderOrderProgressTable(dashboardCurrentRows);
        lastOrderTableSignature = sig;
        updatePager(dashboardTotalRows);
      } else {
        updatePager(dashboardTotalRows);
      }
      upd.textContent = '갱신: ' + formatYmdHmForDashboard(res.updatedAt || new Date().toISOString());
    }

    function decodeDashboardRowKeyAttr(enc) {
      try { return decodeURIComponent(String(enc || '')); } catch (e) { return String(enc || ''); }
    }

    function findDashboardRowByKeyAttr(enc) {
      var rk = decodeDashboardRowKeyAttr(enc);
      for (var i = 0; i < dashboardCurrentRows.length; i++) {
        var row = dashboardCurrentRows[i] || {};
        if (String(row.rowKey || '') === rk) return row;
        if (dashboardRowKeyForDataAttr(row) === enc) return row;
      }
      return null;
    }

    function mergeDashboardRowUpdate(row) {
      if (!row || !row.rowKey) return;
      var enc = dashboardRowKeyForDataAttr(row);
      for (var i = 0; i < dashboardCurrentRows.length; i++) {
        var cur = dashboardCurrentRows[i] || {};
        if (String(cur.rowKey || '') === String(row.rowKey) || dashboardRowKeyForDataAttr(cur) === enc) {
          dashboardCurrentRows[i] = Object.assign({}, cur, row);
          clearDashboardClientCache_();
          rerenderOrderTableKeepingPage();
          return;
        }
      }
    }

    var odDirectModalRowKey = '';

    function setOdModalMsg(text, kind) {
      var el = document.getElementById('odModalMsg');
      if (!el) return;
      el.textContent = text || '';
      el.className = 'od-modal-msg' + (kind === 'err' ? ' err' : kind === 'ok' ? ' ok' : '');
    }

    function closeDirectProgressModal() {
      odDirectModalRowKey = '';
      var modal = document.getElementById('odDirectModal');
      if (modal) { modal.classList.remove('open'); modal.setAttribute('aria-hidden', 'true'); }
      setOdModalMsg('');
    }

    function fillDirectProgressModal(row) {
      row = row || {};
      var tgt = Math.max(0, Math.floor(Number(row.quantity) || 0));
      var smtEff = Math.max(0, Math.floor(Number(row.smtProducedQty) || 0));
      var postEff = Math.max(0, Math.floor(Number(row.postCountedQty) || 0));
      var shipEff = Math.max(0, Math.floor(Number(row.shippedQty) || 0));
      var smtReg = Math.max(0, Math.floor(Number(row.smtRegisteredQty != null ? row.smtRegisteredQty : smtEff) || 0));
      var postReg = Math.max(0, Math.floor(Number(row.postRegisteredQty != null ? row.postRegisteredQty : postEff) || 0));
      var shipReg = Math.max(0, Math.floor(Number(row.shippedRegisteredQty != null ? row.shippedRegisteredQty : shipEff) || 0));
      document.getElementById('odModalProduct').textContent =
        (row.customer ? row.customer + ' · ' : '') + (row.orderNumber || '—') + ' · ' + (row.productName || '—');
      document.getElementById('odModalMeta').textContent =
        '목표 수량 ' + tgt.toLocaleString() + (row.hasDirectProgress ? ' · 직접 수정 적용 중' : '');
      document.getElementById('odModalSmt').value = String(smtEff);
      document.getElementById('odModalPost').value = String(postEff);
      document.getElementById('odModalShip').value = String(shipEff);
      document.getElementById('odModalSmtReg').textContent = '등록 실적 ' + smtReg.toLocaleString();
      document.getElementById('odModalPostReg').textContent = '등록 실적 ' + postReg.toLocaleString();
      document.getElementById('odModalShipReg').textContent = '등록 실적 ' + shipReg.toLocaleString();
      var revertBtn = document.getElementById('odModalRevert');
      if (revertBtn) revertBtn.style.display = row.hasDirectProgress ? '' : 'none';
    }

    function openDirectProgressModal(rowKeyEnc) {
      var row = findDashboardRowByKeyAttr(rowKeyEnc);
      odDirectModalRowKey = row ? String(row.rowKey || decodeDashboardRowKeyAttr(rowKeyEnc)) : decodeDashboardRowKeyAttr(rowKeyEnc);
      setOdModalMsg('');
      document.getElementById('odModalSave').disabled = false;
      function showModal(r) {
        fillDirectProgressModal(r);
        var modal = document.getElementById('odDirectModal');
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        setTimeout(function () {
          var inp = document.getElementById('odModalSmt');
          if (inp) { inp.focus(); inp.select(); }
        }, 80);
      }
      if (row) { showModal(row); return; }
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok || !res.row) {
            alert((res && res.error) ? res.error : '행 정보를 불러오지 못했습니다.');
            return;
          }
          odDirectModalRowKey = String(res.row.rowKey || odDirectModalRowKey);
          showModal(res.row);
        })
        .withFailureHandler(function (err) { alert(err && err.message ? err.message : String(err)); })
        .getOrderDirectProgressDetail(odDirectModalRowKey);
    }

    function saveDirectProgressModal(revert) {
      if (!odDirectModalRowKey) return;
      var btnSave = document.getElementById('odModalSave');
      var btnRevert = document.getElementById('odModalRevert');
      if (btnSave) btnSave.disabled = true;
      if (btnRevert) btnRevert.disabled = true;
      setOdModalMsg(revert ? '되돌리는 중…' : '저장 중…', '');
      var payload = { rowKey: odDirectModalRowKey };
      if (revert) payload.revertToProduction = true;
      else {
        payload.smtQty = document.getElementById('odModalSmt').value;
        payload.postQty = document.getElementById('odModalPost').value;
        payload.shipQty = document.getElementById('odModalShip').value;
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (btnSave) btnSave.disabled = false;
          if (btnRevert) btnRevert.disabled = false;
          if (!res || !res.ok) {
            setOdModalMsg((res && res.error) ? res.error : '저장에 실패했습니다.', 'err');
            return;
          }
          if (res.row) mergeDashboardRowUpdate(res.row);
          setOdModalMsg(revert ? '등록 실적만 사용하도록 되돌렸습니다.' : '저장되었습니다.', 'ok');
          if (window.erpCallNotifyOrdersChanged) window.erpCallNotifyOrdersChanged();
          setTimeout(closeDirectProgressModal, 350);
        })
        .withFailureHandler(function (err) {
          if (btnSave) btnSave.disabled = false;
          if (btnRevert) btnRevert.disabled = false;
          setOdModalMsg(err && err.message ? err.message : String(err), 'err');
        })
        .setOrderDirectProgress(payload);
    }

    function renderOrderProgressTable(orderRows) {
      var rowsHtml = '';
      for (var j = 0; j < (orderRows || []).length; j++) {
        var or = orderRows[j] || {};
        var oNum = or.orderNumber != null ? String(or.orderNumber).trim() : '';
        if (!oNum) continue;
        var smtPct = clampPercent(or.smtProgressPercent);
        var postPct = clampPercent(or.postProgressPercent);
        var outPct = clampPercent(or.outboundPercent);
        var qty = Number(or.quantity) || 0;
        var smtDone = Math.max(0, Math.floor(Number(or.smtProducedQty) || 0));
        var postRaw = Math.max(0, Math.floor(Number(or.postCountedQty) || 0));
        var postDone = qty > 0 ? Math.min(postRaw, qty) : postRaw;
        var shippedRaw = Math.max(0, Math.floor(Number(or.shippedQty) || 0));
        var shipDone = qty > 0 ? Math.min(shippedRaw, qty) : shippedRaw;
        var cust = String(or.customer != null ? or.customer : '').trim();
        var directBadge = or.hasDirectProgress ? '<span class="direct-badge">직접</span>' : '';
        rowsHtml +=
          '<tr class="od-row-clickable" data-row-key="' + dashboardRowKeyForDataAttr(or) + '" title="클릭하여 SMT·후공정·납품 진행 수량 직접 수정">' +
            '<td>' + escapeHtml(cust || '—') + '</td>' +
            '<td>' + escapeHtml(oNum) + directBadge + '</td>' +
            '<td>' + escapeHtml(or.productName || '-') + '</td>' +
            '<td class="cell-num">' + escapeHtml(String(qty)) + '</td>' +
            '<td>' + progressBarHtml(smtPct, 'smt', dashboardProgressLabelMode, smtDone, qty) + '</td>' +
            '<td>' + progressBarHtml(postPct, 'post', dashboardProgressLabelMode, postDone, qty) + '</td>' +
            '<td>' + progressBarHtml(outPct, 'outbound', dashboardProgressLabelMode, shipDone, qty) + '</td>' +
          '</tr>';
      }

      if (!rowsHtml) return '<div class="loading">표시할 주문(제품) 행이 없습니다.</div>';
      return (
        '<table class="dashboard-table">' +
          '<thead><tr>' +
            '<th>고객사</th>' +
            '<th>주문서</th>' +
            '<th>제품</th>' +
            '<th class="cell-num">수량</th>' +
            '<th title="막대·숫자 클릭 시 % ↔ 수량 전환">SMT 진행률</th>' +
            '<th title="막대·숫자 클릭 시 % ↔ 수량 전환">후공정 진행률</th>' +
            '<th title="완제품 고객 납품(출하) 대수 · 생산 불출과 별도 · 막대 클릭 시 % ↔ 수량">납품(출하) 진행률</th>' +
          '</tr></thead>' +
          '<tbody>' + rowsHtml + '</tbody>' +
        '</table>'
      );
    }

    function updatePager(totalRows) {
      var pager = document.getElementById('dashboardPager');
      var prev = document.getElementById('pagerPrev');
      var next = document.getElementById('pagerNext');
      var info = document.getElementById('pagerInfo');
      if (!pager || !prev || !next || !info) return;
      var totalPages = dashboardTotalPages || Math.max(1, Math.ceil((totalRows || 0) / dashboardPageSize));
      pager.style.display = totalRows > 0 ? 'flex' : 'none';
      if (dashboardPage > totalPages) dashboardPage = totalPages;
      prev.disabled = dashboardPage <= 1;
      next.disabled = dashboardPage >= totalPages;
      info.textContent = dashboardPage + ' / ' + totalPages + ' (' + (totalRows || 0) + '건)';
    }

    function updateOrderProgressBarsOnly(orderRows) {
      var table = document.querySelector('#dashboardTableWrap table.dashboard-table');
      if (!table) return false;
      var rowByKey = {};
      var trList = table.querySelectorAll('tbody tr[data-row-key]');
      for (var ri = 0; ri < trList.length; ri++) {
        var enc = trList[ri].getAttribute('data-row-key') || '';
        if (enc) rowByKey[enc] = trList[ri];
      }
      for (var j = 0; j < orderRows.length; j++) {
        var or = orderRows[j] || {};
        var on = or.orderNumber != null ? String(or.orderNumber).trim() : '';
        if (!on) continue;
        var encK = dashboardRowKeyForDataAttr(or);
        var row = rowByKey[encK];
        if (!row) continue;
        var smtPct = clampPercent(or.smtProgressPercent);
        var postPct = clampPercent(or.postProgressPercent);
        var outPct = clampPercent(or.outboundPercent);
        var qty = Number(or.quantity) || 0;
        var smtDone = Math.max(0, Math.floor(Number(or.smtProducedQty) || 0));
        var postRaw = Math.max(0, Math.floor(Number(or.postCountedQty) || 0));
        var postDone = qty > 0 ? Math.min(postRaw, qty) : postRaw;
        var shippedRaw = Math.max(0, Math.floor(Number(or.shippedQty) || 0));
        var shipDone = qty > 0 ? Math.min(shippedRaw, qty) : shippedRaw;
        var smtFill = row.querySelector('.bar-fill.smt');
        var smtLabel = row.querySelector('.bar-label.smt-label');
        var postFill = row.querySelector('.bar-fill.post');
        var postLabel = row.querySelector('.bar-label.post-label');
        var outFill = row.querySelector('.bar-fill.outbound');
        var outLabel = row.querySelector('.bar-label.outbound-label');
        if (smtFill) smtFill.style.width = smtPct + '%';
        if (smtLabel) smtLabel.textContent = formatProgressLabel(dashboardProgressLabelMode, or.smtProgressPercent, smtDone, qty);
        if (postFill) postFill.style.width = postPct + '%';
        if (postLabel) postLabel.textContent = formatProgressLabel(dashboardProgressLabelMode, or.postProgressPercent, postDone, qty);
        if (outFill) outFill.style.width = outPct + '%';
        if (outLabel) outLabel.textContent = formatProgressLabel(dashboardProgressLabelMode, or.outboundPercent, shipDone, qty);
      }
      return true;
    }

    function loadDashboardProgress(pageOverride, opts) {
      opts = opts || {};
      var root = document.getElementById('dashboardTableWrap');
      var loadOpts = dashboardLoadOptions_(pageOverride);
      if (pageOverride != null) dashboardPage = pageOverride;
      var cached = opts.skipCache ? null : readDashboardClientCache_(loadOpts);
      if (cached && cached.ok) {
        applyDashboardPageResponse_(cached, { forceRender: true, page: loadOpts.page, pageSize: loadOpts.pageSize, customer: loadOpts.customer, hideCompleted: loadOpts.hideCompleted });
      } else if (root && !dashboardCurrentRows.length) {
        root.innerHTML = '<div class="loading">진행률 불러오는 중…</div>';
      }
      var token = ++dashboardLoadToken;

      function failLoad(msg) {
        if (token !== dashboardLoadToken) return;
        if (root && !dashboardCurrentRows.length) {
          root.innerHTML = '<div class="loading">' + escapeHtml(msg || '진행률을 불러오지 못했습니다.') + '</div>';
        }
      }

      google.script.run
        .withSuccessHandler(function (res) {
          if (token !== dashboardLoadToken) return;
          if (!res || !res.ok) {
            failLoad((res && res.error) ? res.error : '진행률을 불러오지 못했습니다.');
            return;
          }
          writeDashboardClientCache_(loadOpts, res);
          applyDashboardPageResponse_(res, loadOpts);
          if (window.erpMarkOrdersRevisionSeen) window.erpMarkOrdersRevisionSeen();
        })
        .withFailureHandler(failLoad)
        .getOrderDashboardPageData(loadOpts);
    }

    window.refreshOrderStatusTab = function () {
      clearDashboardClientCache_();
      loadDashboardProgress(dashboardPage, { skipCache: true });
    };

    window.initOrderStatusTab = function () { if (window.__orderStatusTabInited__) return; window.__orderStatusTabInited__ = true;
      var tableWrap = document.getElementById('dashboardTableWrap');
      if (tableWrap) {
        tableWrap.addEventListener('click', function (ev) {
          if (ev.target.closest('.js-progress-toggle')) {
            ev.stopPropagation();
            dashboardProgressLabelMode = dashboardProgressLabelMode === 'percent' ? 'qty' : 'percent';
            rerenderOrderTableKeepingPage();
            return;
          }
          var tr = ev.target.closest('tbody tr[data-row-key]');
          if (tr) openDirectProgressModal(tr.getAttribute('data-row-key'));
        });
        tableWrap.addEventListener('keydown', function (ev) {
          if (ev.key !== 'Enter' && ev.key !== ' ') return;
          if (!ev.target.closest('.js-progress-toggle')) return;
          ev.preventDefault();
          dashboardProgressLabelMode = dashboardProgressLabelMode === 'percent' ? 'qty' : 'percent';
          rerenderOrderTableKeepingPage();
        });
      }
      var odClose = document.getElementById('odDirectModalClose');
      var odCancel = document.getElementById('odModalCancel');
      var odSave = document.getElementById('odModalSave');
      var odRevert = document.getElementById('odModalRevert');
      var odModal = document.getElementById('odDirectModal');
      if (odClose) odClose.addEventListener('click', closeDirectProgressModal);
      if (odCancel) odCancel.addEventListener('click', closeDirectProgressModal);
      if (odSave) odSave.addEventListener('click', function () { saveDirectProgressModal(false); });
      if (odRevert) odRevert.addEventListener('click', function () {
        if (!confirm('직접 수정을 해제하고 SMT·후공정·출하 등록 실적만 사용할까요?')) return;
        saveDirectProgressModal(true);
      });
      if (odModal) {
        odModal.addEventListener('click', function (ev) { if (ev.target === odModal) closeDirectProgressModal(); });
      }
      var prevBtn = document.getElementById('pagerPrev');
      var nextBtn = document.getElementById('pagerNext');
      var customerSel = document.getElementById('customerFilterSelect');
      var showCompletedEl = document.getElementById('showCompletedOrders');
      if (customerSel) {
        customerSel.addEventListener('change', function () {
          dashboardCustomerFilter = customerSel.value || '';
          loadDashboardProgress(1);
        });
      }
      if (showCompletedEl) {
        showCompletedEl.addEventListener('change', function () {
          dashboardHideCompleted = !showCompletedEl.checked;
          loadDashboardProgress(1);
        });
      }
      if (prevBtn) {
        prevBtn.addEventListener('click', function () {
          if (dashboardPage <= 1) return;
          loadDashboardProgress(dashboardPage - 1);
        });
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', function () {
          if (dashboardPage >= dashboardTotalPages) return;
          loadDashboardProgress(dashboardPage + 1);
        });
      }
      loadDashboardProgress(1);
      setInterval(function () {
        loadDashboardProgress(dashboardPage, { skipCache: true });
      }, 600000);
    };
</script>

  <script type="application/json" id="gas-webapp-url"><?!= JSON.stringify(ScriptApp.getService().getUrl()) ?></script>
  <script>window.ORDER_INITIAL_TAB = '<?!= initialTab || "list" ?>';</script>
  <script>
    const CACHE_KEY = 'webAppBaseUrl';
    const CACHE_DURATION = 30 * 60 * 1000;
    let cachedBaseUrl = null;
    (function syncWebAppUrlFromServer() {
      var u = null;
      try {
        var el = document.getElementById('gas-webapp-url');
        if (el && el.textContent) u = JSON.parse(el.textContent.trim());
      } catch (e) {}
      if (u) {
        cachedBaseUrl = u;
        window.cachedBaseUrl = u;
        try {
          sessionStorage.setItem(CACHE_KEY, JSON.stringify({ url: u, timestamp: Date.now() }));
        } catch (e) {}
      }
    })();

    const ORDERS_LIST_SESSION_KEY = 'miraeSMT_ordersList_v1';
    const ORDERS_LIST_SESSION_MAX_MS = 8 * 60 * 1000;
    let lastOrdersRenderFingerprint = null;
    let ordersListCache = [];
    let isEditMode = false;
    let editingOrderNumber = null;
    let productOptions = [];
    let orderItems = [];

    function parseOrderDateSort(s) {
      if (!s) return 0;
      var m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10)).getTime();
      var t = Date.parse(s);
      return isNaN(t) ? 0 : t;
    }

    function sortOrdersNewestFirst(orders) {
      return (orders || []).slice().sort(function(a, b) {
        var db = parseOrderDateSort(b.orderDate);
        var da = parseOrderDateSort(a.orderDate);
        if (db !== da) return db - da;
        return (b.orderNumber || '').localeCompare(a.orderNumber || '', undefined, { numeric: true });
      });
    }

    /** 시트 행 목록 → 주문서번호별 1건 요약 */
    function groupOrdersByNumber(orders) {
      var map = {};
      (orders || []).forEach(function (o) {
        var no = (o.orderNumber || '').trim();
        if (!no) return;
        if (!map[no]) {
          map[no] = {
            orderNumber: no,
            orderDate: o.orderDate || '',
            deliveryDate: o.deliveryDate || '',
            customer: o.customer || '',
            category: o.category || '',
            items: [],
            totalQuantity: 0,
            totalAmount: 0
          };
        }
        map[no].items.push(o);
        map[no].totalQuantity += Number(o.quantity) || 0;
        map[no].totalAmount += Number(o.orderAmount) || 0;
      });
      return Object.keys(map).map(function (k) { return map[k]; });
    }

    function formatProductSummary(group) {
      var items = (group && group.items) || [];
      if (!items.length) return '-';
      var first = (items[0].productName || '').trim() || '-';
      if (items.length === 1) return first;
      return first + ' 외 ' + (items.length - 1) + '건';
    }

    function formatCurrency(n) {
      var x = Number(n) || 0;
      return '₩ ' + x.toLocaleString();
    }

    var ORDER_CATEGORIES = ['양산', '샘플', '자재'];

    function normalizeCategory(cat) {
      var c = String(cat || '').trim();
      if (ORDER_CATEGORIES.indexOf(c) >= 0) return c;
      if (c === '확정') return '양산';
      return c || '양산';
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatCategoryBadge(cat) {
      var c = normalizeCategory(cat);
      var cls = 'cat-other';
      if (c === '양산') cls = 'cat-mass';
      else if (c === '샘플') cls = 'cat-sample';
      else if (c === '자재') cls = 'cat-material';
      return '<span class="cat-badge ' + cls + '">' + escapeHtml(c) + '</span>';
    }

    function onError(err) {
      console.error(err);
      alert('오류: ' + (err && err.message ? err.message : err));
    }

    function findProductByCode(code) {
      var c = String(code || '').trim();
      if (!c) return null;
      for (var i = 0; i < productOptions.length; i++) {
        if (String(productOptions[i].productCode || '').trim() === c) return productOptions[i];
      }
      return null;
    }

    function normalizeProductName(v) {
      return String(v || '')
        .replace(/\u00A0/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function sanitizeProductNameInput(v) {
      // datalist 표시 라벨에 코드가 붙어 들어온 경우(예: "제품명 (P001)") 대비
      var s = String(v || '').replace(/\u00A0/g, ' ').trim();
      var m = s.match(/^(.*)\s+\([^)]+\)\s*$/);
      if (m && m[1]) return m[1].trim();
      return s;
    }

    function findProductByName(name) {
      var n = normalizeProductName(sanitizeProductNameInput(name));
      if (!n) return null;
      var fallback = null;
      for (var i = 0; i < productOptions.length; i++) {
        var p = productOptions[i] || {};
        if (normalizeProductName(p.productName) !== n) continue;
        var code = String(p.productCode || '').trim();
        if (code) return p; // 코드 있는 항목 우선
        if (!fallback) fallback = p;
      }
      return fallback;
    }

    function resolveProductFromInput(rawInput) {
      var input = sanitizeProductNameInput(rawInput);
      var norm = normalizeProductName(input);
      if (!norm) return null;

      // 1) 정확한 제품명
      var byName = findProductByName(input);
      if (byName) return byName;

      // 2) 정확한 제품코드
      var byCode = findProductByCode(input);
      if (byCode) return byCode;

      // 3) 시작 일치(제품명/제품코드) - 단일 후보면 채택
      var starts = [];
      for (var i = 0; i < productOptions.length; i++) {
        var p = productOptions[i] || {};
        var pn = normalizeProductName(p.productName);
        var pc = String(p.productCode || '').trim().toLowerCase();
        if ((pn && pn.indexOf(norm) === 0) || (pc && pc.indexOf(norm) === 0)) starts.push(p);
      }
      if (starts.length === 1) return starts[0];
      if (starts.length > 1) {
        var startsWithCode = starts.filter(function (x) { return String((x && x.productCode) || '').trim() !== ''; });
        if (startsWithCode.length === 1) return startsWithCode[0];
      }

      // 4) 포함 일치(제품명/제품코드) - 단일 후보면 채택
      var contains = [];
      for (var j = 0; j < productOptions.length; j++) {
        var q = productOptions[j] || {};
        var qn = normalizeProductName(q.productName);
        var qc = String(q.productCode || '').trim().toLowerCase();
        if ((qn && qn.indexOf(norm) >= 0) || (qc && qc.indexOf(norm) >= 0)) contains.push(q);
      }
      if (contains.length === 1) return contains[0];
      if (contains.length > 1) {
        var containsWithCode = contains.filter(function (x) { return String((x && x.productCode) || '').trim() !== ''; });
        if (containsWithCode.length === 1) return containsWithCode[0];
      }
      return null;
    }

    function applyProductPickToRow(idx, p) {
      if (!p || idx < 0 || idx >= orderItems.length) return;
      orderItems[idx].productName = String(p.productName || '').trim();
      orderItems[idx].productCode = String(p.productCode || '').trim();
    }

    /** 제품코드(추천 선택·정확 일치) → 제품명 자동 입력 */
    function tryApplyProductFromCode(idx, codeRaw) {
      if (idx < 0 || idx >= orderItems.length) return false;
      var code = String(codeRaw != null ? codeRaw : '').trim();
      orderItems[idx].productCode = code;
      if (!code) return false;
      var p = findProductByCode(code);
      if (!p) return false;
      orderItems[idx].productName = String(p.productName || '').trim();
      return true;
    }

    function renderProductDatalists() {
      var codeList = document.getElementById('productCodeOptions');
      if (!codeList) return;
      var codeHtml = '';
      for (var i = 0; i < productOptions.length; i++) {
        var p = productOptions[i] || {};
        var code = String(p.productCode || '').trim();
        var name = String(p.productName || '').trim();
        if (!code) continue;
        var label = name || '';
        codeHtml +=
          '<option value="' +
          code.replace(/"/g, '&quot;') +
          '"' +
          (label ? ' label="' + label.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '"' : '') +
          '></option>';
      }
      codeList.innerHTML = codeHtml;
    }

    function onOrdersLoaded(orders) {
      orders = orders || [];
      var fp = JSON.stringify(orders);
      if (fp === lastOrdersRenderFingerprint) {
        ordersListCache = orders;
        return;
      }
      lastOrdersRenderFingerprint = fp;
      ordersListCache = orders;
      try {
        sessionStorage.setItem(ORDERS_LIST_SESSION_KEY, JSON.stringify(orders));
        sessionStorage.setItem(ORDERS_LIST_SESSION_KEY + '_ts', String(Date.now()));
      } catch (e) {}

      var container = document.getElementById('tableContent');
      var sorted = sortOrdersNewestFirst(orders);

      if (!sorted.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div>' +
          '<div class="empty-state-message">등록된 주문서가 없습니다</div>' +
          '<div class="empty-state-submessage">견적서 관리에서 견적 상세를 연 뒤 「주문서 생성」으로 등록할 수 있습니다.</div></div>';
        return;
      }

      var grouped = sortOrdersNewestFirst(groupOrdersByNumber(sorted));

      var html = '<table><thead><tr>' +
        '<th>주문일</th><th>납기일</th><th>주문서번호</th><th>고객사</th><th>제품</th>' +
        '<th class="text-right">수량합계</th><th class="text-right">주문금액</th><th>구분</th></tr></thead><tbody>';

      grouped.forEach(function (group) {
        var onum = (group.orderNumber || '').replace(/'/g, "\\'");
        var itemCount = (group.items || []).length;
        html += '<tr class="order-row" onclick="editOrder(\'' + onum + '\')" title="' + itemCount + '개 제품">' +
          '<td>' + (group.orderDate || '-') + '</td>' +
          '<td>' + (group.deliveryDate || '-') + '</td>' +
          '<td><strong>' + (group.orderNumber || '-') + '</strong></td>' +
          '<td>' + (group.customer || '-') + '</td>' +
          '<td>' + formatProductSummary(group) + '</td>' +
          '<td class="text-right">' + (Number(group.totalQuantity) || 0).toLocaleString() + '</td>' +
          '<td class="text-right"><strong>' + formatCurrency(group.totalAmount) + '</strong></td>' +
          '<td>' + formatCategoryBadge(group.category) + '</td></tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function loadOrdersListWithSessionCache() {
      try {
        var raw = sessionStorage.getItem(ORDERS_LIST_SESSION_KEY);
        var ts = sessionStorage.getItem(ORDERS_LIST_SESSION_KEY + '_ts');
        if (raw != null && ts && (Date.now() - parseInt(ts, 10) < ORDERS_LIST_SESSION_MAX_MS)) {
          onOrdersLoaded(JSON.parse(raw));
        }
      } catch (e) {}
      google.script.run
        .withSuccessHandler(function(orders) { onOrdersLoaded(orders || []); })
        .withFailureHandler(onError)
        .getOrders();
    }

    function resolveInitialOrderTab() {
      try {
        var u = new URL(window.location.href);
        if (u.searchParams.get('tab') === 'status') return 'status';
      } catch (eUrl) {}
      try {
        if (sessionStorage.getItem('orderPageTab') === 'status') {
          sessionStorage.removeItem('orderPageTab');
          return 'status';
        }
      } catch (eSs) {}
      if (window.ORDER_INITIAL_TAB === 'status') return 'status';
      return 'list';
    }

    var orderActiveTab = 'list';

    window.switchOrderTab = function (tab) {
      tab = tab === 'status' ? 'status' : 'list';
      orderActiveTab = tab;
      var listEl = document.getElementById('orderTabList');
      var statusEl = document.getElementById('orderTabStatus');
      var actionsEl = document.getElementById('erpOrderListActions');
      if (listEl) {
        if (tab === 'list') listEl.removeAttribute('hidden');
        else listEl.setAttribute('hidden', '');
      }
      if (statusEl) {
        if (tab === 'status') statusEl.removeAttribute('hidden');
        else statusEl.setAttribute('hidden', '');
      }
      if (actionsEl) actionsEl.style.display = tab === 'list' ? '' : 'none';
      document.querySelectorAll('.order-page-tab').forEach(function (btn) {
        var on = btn.getAttribute('data-tab') === tab;
        btn.classList.toggle('active', on);
        btn.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      if (tab === 'status' && typeof window.initOrderStatusTab === 'function') {
        window.initOrderStatusTab();
      }
      try {
        if (window.history && window.history.replaceState) {
          var u2 = new URL(window.location.href);
          if (tab === 'status') u2.searchParams.set('tab', 'status');
          else u2.searchParams.delete('tab');
          window.history.replaceState({}, '', u2.toString());
        }
      } catch (eHist) {}
    };

    window.erpApplyPendingOrderTab = function () {
      var tab = resolveInitialOrderTab();
      if (tab === 'status') window.switchOrderTab('status');
    };

    window.erpRefreshForOrdersChange = function () {
      loadOrdersListWithSessionCache();
      if (typeof window.refreshOrderStatusTab === 'function') window.refreshOrderStatusTab();
    };

    function initOrderManagementPage() {
      document.querySelectorAll('.order-page-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          window.switchOrderTab(btn.getAttribute('data-tab'));
        });
      });
      window.switchOrderTab(resolveInitialOrderTab());
      if (!cachedBaseUrl) {
        var cached = sessionStorage.getItem(CACHE_KEY);
        if (cached) {
          try {
            var cacheData = JSON.parse(cached);
            if (Date.now() - cacheData.timestamp < CACHE_DURATION) cachedBaseUrl = cacheData.url;
            else sessionStorage.removeItem(CACHE_KEY);
          } catch (e) { sessionStorage.removeItem(CACHE_KEY); }
        }
      }
      if (!cachedBaseUrl) {
        google.script.run
          .withSuccessHandler(function(baseUrl) {
            if (baseUrl) {
              cachedBaseUrl = baseUrl;
              try {
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ url: baseUrl, timestamp: Date.now() }));
              } catch (e) {}
            }
          })
          .withFailureHandler(function(e) { console.error(e); })
          .getWebAppUrl();
      }
      loadOrdersListWithSessionCache();
      google.script.run
        .withSuccessHandler(function(rows) {
          productOptions = rows || [];
          renderProductDatalists();
          if (document.getElementById('orderModal').style.display === 'block') renderOrderItems();
        })
        .withFailureHandler(function() {
          productOptions = [];
          renderProductDatalists();
          if (document.getElementById('orderModal').style.display === 'block') renderOrderItems();
        })
        .getMrpProductOptions();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initOrderManagementPage);
    } else {
      initOrderManagementPage();
    }

    function closeOrderModal() {
      document.getElementById('orderModal').style.display = 'none';
      isEditMode = false;
      editingOrderNumber = null;
    }

    document.addEventListener('keydown', function(event) {
      if (event.key !== 'Escape') return;
      var modal = document.getElementById('orderModal');
      if (modal && modal.style.display === 'block') closeOrderModal();
    });

    function todayYmd() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function orderLinesToItems(lines) {
      return (lines || []).map(function (o) {
        var qty = Number(o.quantity) || 0;
        var unitPrice = o.unitPrice != null ? (Number(o.unitPrice) || 0) : (qty > 0 ? Math.round((Number(o.orderAmount) || 0) / qty) : 0);
        return {
          productCode: String(o.productCode != null ? o.productCode : '').trim(),
          productName: o.productName || '',
          quantity: String(qty),
          unitPrice: String(unitPrice),
          orderAmount: String(o.orderAmount != null ? o.orderAmount : qty * unitPrice)
        };
      });
    }

    function populateOrderModal(order) {
      var lines = order.items && order.items.length ? order.items : [order];
      document.getElementById('fieldOrderNumber').value = order.orderNumber || (lines[0] && lines[0].orderNumber) || '';
      document.getElementById('fieldOrderDate').value = ((order.orderDate || (lines[0] && lines[0].orderDate)) || '').slice(0, 10);
      document.getElementById('fieldDeliveryDate').value = ((order.deliveryDate || (lines[0] && lines[0].deliveryDate)) || '').slice(0, 10);
      document.getElementById('fieldCustomer').value = order.customer || (lines[0] && lines[0].customer) || '';
      var catEl = document.getElementById('fieldCategory');
      if (catEl) catEl.value = normalizeCategory(order.category || (lines[0] && lines[0].category));
      orderItems = orderLinesToItems(lines);
      if (!orderItems.length) {
        orderItems = [{ productCode: '', productName: '', quantity: '0', unitPrice: '0', orderAmount: '0' }];
      }
      renderOrderItems();
    }

    function openNewOrder() {
      isEditMode = false;
      editingOrderNumber = null;
      document.getElementById('orderModalTitle').textContent = '신규 주문서';
      populateOrderModal({
        orderNumber: '',
        orderDate: todayYmd(),
        deliveryDate: '',
        customer: '',
        category: '양산',
        productName: '',
        quantity: 0,
        orderAmount: 0,
        detailInfo: {}
      });
      var noEl = document.getElementById('fieldOrderNumber');
      noEl.value = '';
      noEl.readOnly = false;
      noEl.placeholder = '비우면 자동생성';
      document.getElementById('btnDeleteOrder').style.display = 'none';
      document.getElementById('orderModal').style.display = 'block';
    }

    function ensureOrderItemsSeed() {
      if (!orderItems.length) {
        orderItems = [{ productCode: '', productName: '', quantity: '0', unitPrice: '0', orderAmount: '0' }];
      }
    }

    function renderOrderItems() {
      ensureOrderItemsSeed();
      var root = document.getElementById('orderItemsRoot');
      var html =
        '<table class="order-items-table"><thead><tr>' +
        '<th style="width:16%;">제품코드</th>' +
        '<th style="width:36%;">제품명</th>' +
        '<th style="width:12%;">수량</th>' +
        '<th style="width:14%;">단가(원)</th>' +
        '<th style="width:14%;">주문금액(원)</th>' +
        '<th style="width:8%;"></th></tr></thead><tbody>';
      for (var i = 0; i < orderItems.length; i++) {
        var it = orderItems[i] || {};
        var qty = Number(it.quantity) || 0;
        var unitPrice = Number(it.unitPrice) || 0;
        var amount = qty * unitPrice;
        html += '<tr>';
        html +=
          '<td><input type="text" class="oi-code" data-idx="' +
          i +
          '" list="productCodeOptions" placeholder="코드 (추천)" value="' +
          (it.productCode || '').replace(/"/g, '&quot;') +
          '" autocomplete="off"></td>';
        html +=
          '<td><input type="text" class="oi-name" data-idx="' +
          i +
          '" placeholder="제품명 직접 입력" value="' +
          (it.productName || '').replace(/"/g, '&quot;') +
          '"></td>';
        html += '<td><input type="number" class="oi-qty" data-idx="' + i + '" min="0" step="1" value="' + (it.quantity || '0') + '"></td>';
        html += '<td><input type="number" class="oi-price" data-idx="' + i + '" min="0" step="1" value="' + (it.unitPrice || '0') + '"></td>';
        html += '<td><input type="number" class="oi-amt" data-idx="' + i + '" min="0" step="1" value="' + String(amount) + '" readonly></td>';
        html += '<td><button type="button" class="btn-secondary oi-del" data-idx="' + i + '"' + (orderItems.length <= 1 ? ' disabled' : '') + '>삭제</button></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      root.innerHTML = html;
    }

    function addOrderItemRow() {
      orderItems.push({
        productCode: '',
        productName: '',
        quantity: '0',
        unitPrice: '0',
        orderAmount: '0'
      });
      renderOrderItems();
    }

    function editOrder(orderNumber) {
      if (!orderNumber) return;
      isEditMode = true;
      editingOrderNumber = orderNumber;

      var cachedLines = ordersListCache.filter(function (o) {
        return (o.orderNumber || '').trim() === String(orderNumber).trim();
      });
      if (cachedLines.length) {
        document.getElementById('orderModalTitle').textContent = '주문서 수정 (' + cachedLines.length + '개 제품)';
        populateOrderModal({
          orderNumber: orderNumber,
          orderDate: cachedLines[0].orderDate,
          deliveryDate: cachedLines[0].deliveryDate,
          customer: cachedLines[0].customer,
          category: cachedLines[0].category,
          items: cachedLines
        });
        document.getElementById('fieldOrderNumber').readOnly = true;
        document.getElementById('btnDeleteOrder').style.display = 'inline-block';
        document.getElementById('orderModal').style.display = 'block';
        return;
      }

      google.script.run
        .withSuccessHandler(function (bundle) {
          if (!bundle || !bundle.items || !bundle.items.length) {
            alert('주문서를 찾을 수 없습니다.');
            return;
          }
          document.getElementById('orderModalTitle').textContent = '주문서 수정 (' + bundle.items.length + '개 제품)';
          populateOrderModal(bundle);
          document.getElementById('fieldOrderNumber').readOnly = true;
          document.getElementById('btnDeleteOrder').style.display = 'inline-block';
          document.getElementById('orderModal').style.display = 'block';
        })
        .withFailureHandler(onError)
        .getOrdersByNumber(orderNumber);
    }

    function saveOrderFromModal() {
      var items = [];
      for (var i = 0; i < orderItems.length; i++) {
        var r = orderItems[i] || {};
        var productCode = String(r.productCode != null ? r.productCode : '').trim();
        var productName = sanitizeProductNameInput(r.productName || '');
        var quantity = Number(r.quantity) || 0;
        var unitPrice = Number(r.unitPrice) || 0;
        var orderAmount = quantity * unitPrice;
        if (!productName && !productCode && quantity <= 0 && orderAmount <= 0) continue;
        if (!productName) {
          alert((i + 1) + '행 제품명을 입력하세요.');
          return;
        }
        if (quantity <= 0) {
          alert((i + 1) + '행 수량은 0보다 커야 합니다.');
          return;
        }
        if (unitPrice < 0) {
          alert((i + 1) + '행 단가는 0 이상이어야 합니다.');
          return;
        }
        items.push({
          productCode: productCode,
          productName: productName,
          quantity: quantity,
          unitPrice: unitPrice,
          orderAmount: orderAmount
        });
      }
      if (!items.length) {
        alert('제품을 1개 이상 입력하세요.');
        return;
      }
      var category = normalizeCategory(document.getElementById('fieldCategory').value);
      for (var k = 0; k < items.length; k++) {
        items[k].category = category;
      }
      var payload = {
        orderNumber: isEditMode ? (editingOrderNumber || '') : document.getElementById('fieldOrderNumber').value.trim(),
        orderDate: document.getElementById('fieldOrderDate').value || todayYmd(),
        deliveryDate: document.getElementById('fieldDeliveryDate').value || '',
        customer: document.getElementById('fieldCustomer').value.trim(),
        category: category,
        items: items
      };
      payload.source = 'manual';

      if (isEditMode && editingOrderNumber) {
        google.script.run
          .withSuccessHandler(function (res) {
            if (!res || !res.ok) {
              alert((res && res.error) ? res.error : '수정에 실패했습니다.');
              return;
            }
            closeOrderModal();
            loadOrdersListWithSessionCache();
            if (window.erpCallNotifyOrdersChanged) window.erpCallNotifyOrdersChanged();
          })
          .withFailureHandler(onError)
          .updateOrderBatch(payload);
      } else {
        google.script.run
          .withSuccessHandler(function (res) {
            if (!res || !res.ok) {
              alert((res && res.error) ? res.error : '신규 저장에 실패했습니다.');
              return;
            }
            closeOrderModal();
            loadOrdersListWithSessionCache();
            if (window.erpCallNotifyOrdersChanged) window.erpCallNotifyOrdersChanged();
          })
          .withFailureHandler(onError)
          .saveOrderBatch(payload);
      }
    }

    document.getElementById('orderItemsRoot').addEventListener('input', function (ev) {
      var idx = parseInt(ev.target.getAttribute('data-idx'), 10);
      if (isNaN(idx) || idx < 0 || idx >= orderItems.length) return;
      if (ev.target.classList.contains('oi-code')) {
        orderItems[idx].productCode = ev.target.value || '';
      }
      if (ev.target.classList.contains('oi-name')) {
        orderItems[idx].productName = ev.target.value || '';
      }
      if (ev.target.classList.contains('oi-qty')) orderItems[idx].quantity = ev.target.value || '0';
      if (ev.target.classList.contains('oi-price')) orderItems[idx].unitPrice = ev.target.value || '0';
      if (ev.target.classList.contains('oi-qty') || ev.target.classList.contains('oi-price')) {
        var q = Number(orderItems[idx].quantity) || 0;
        var p = Number(orderItems[idx].unitPrice) || 0;
        orderItems[idx].orderAmount = String(q * p);
        var rowEl = ev.target.closest('tr');
        if (rowEl) {
          var amtEl = rowEl.querySelector('.oi-amt');
          if (amtEl) amtEl.value = String(q * p);
        }
      }
    });
    document.getElementById('orderItemsRoot').addEventListener('change', function (ev) {
      var idx = parseInt(ev.target.getAttribute('data-idx'), 10);
      if (isNaN(idx) || idx < 0 || idx >= orderItems.length) return;
      if (ev.target.classList.contains('oi-code')) {
        if (tryApplyProductFromCode(idx, ev.target.value)) {
          renderOrderItems();
        }
        return;
      }
      if (ev.target.classList.contains('oi-name')) {
        orderItems[idx].productName = ev.target.value || '';
      }
    });
    document.getElementById('orderItemsRoot').addEventListener('blur', function (ev) {
      var idx = parseInt(ev.target.getAttribute('data-idx'), 10);
      if (isNaN(idx) || idx < 0 || idx >= orderItems.length) return;
      if (!ev.target.classList.contains('oi-code')) return;
      if (tryApplyProductFromCode(idx, ev.target.value)) {
        renderOrderItems();
      }
    }, true);
    document.getElementById('orderItemsRoot').addEventListener('click', function (ev) {
      var btn = ev.target.closest('.oi-del');
      if (!btn) return;
      var idx = parseInt(btn.getAttribute('data-idx'), 10);
      if (isNaN(idx) || idx < 0 || idx >= orderItems.length) return;
      if (orderItems.length <= 1) return;
      orderItems.splice(idx, 1);
      renderOrderItems();
    });

    function deleteOrderFromModal() {
      if (!editingOrderNumber) return;
      if (!confirm('주문서 ' + editingOrderNumber + '의 모든 제품 행을 삭제할까요?')) return;
      google.script.run
        .withSuccessHandler(function(ok) {
          if (!ok) {
            alert('삭제에 실패했습니다.');
            return;
          }
          closeOrderModal();
          loadOrdersListWithSessionCache();
          if (window.erpCallNotifyOrdersChanged) window.erpCallNotifyOrdersChanged();
        })
        .withFailureHandler(onError)
        .deleteOrder(editingOrderNumber);
    }

    function setOrderStatus(orderNumber, status) {
      if (!orderNumber) return;
      google.script.run
        .withSuccessHandler(function(ok) {
          if (!ok) {
            alert('상태 변경에 실패했습니다.');
            return;
          }
          loadOrdersListWithSessionCache();
        })
        .withFailureHandler(onError)
        .setOrderStatus(orderNumber, status);
    }
  </script>
</body>
</html>
