                  <label class="post-register-label" for="qtyInput3">이번 등록 수량</label>
                  <div class="post-register-row">
                    <input type="number" id="qtyInput3" class="post-register-input" min="1" step="1" placeholder="0" disabled />
                    <button type="button" class="post-register-btn" id="btnPostSubmit3" disabled>등록</button>
                  </div>
                  <p class="post-register-hint" id="postRegisterHint3"></p>
                </div>
                <div id="msg3" class="msg"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="viewPlan" class="erp-page-body" style="display:none;">
      <div class="card">
        <div id="postPlanRoot"></div>
      </div>
    </div>
  </div>

  <div id="postPanelSettingsMenu" class="post-panel-settings-menu" role="menu" aria-hidden="true">
    <button type="button" class="post-panel-menu-item js-post-menu-reset danger" role="menuitem">0으로 초기화</button>
    <div class="post-panel-menu-divider js-post-menu-add-divider" style="display:none;"></div>
    <button type="button" class="post-panel-menu-item js-post-menu-add" role="menuitem" style="display:none;">입력 추가</button>
  </div>

  <script type="application/json" id="gas-webapp-url"><?!= JSON.stringify(ScriptApp.getService().getUrl()) ?></script>
  <?!= include('PlanCalendarWidget'); ?>
  <script>
    var cachedBaseUrl = null;
    (function syncWebAppUrlFromServer() {
      try {
        var el = document.getElementById('gas-webapp-url');
        if (el && el.textContent) {
          cachedBaseUrl = JSON.parse(el.textContent.trim());
          window.cachedBaseUrl = cachedBaseUrl;
        }
      } catch (e) {}
    })();

    var orders = [];
    /** 현재 카드 클릭 시 주문이 배정될 입력 패널 ('' | '2' | '3') */
    var activePanelSuffix = '';
    /** 시트 기준 누적(서버에서 받은 값만 갱신 — 새로고침 시 이 값으로 목표 대비 표시) */
    var counts = {};
    /** 같은 날짜(KST) 서버 기준 현재 입력(주문서+모델) */
    var sessionTallyByOrder = {};
    var busy = false;
    var pendingDeltaByOrder = {};
    var flushTimer = null;
    var flushInFlight = false;
    var postOrderCardPage = 1;
    var POST_ORDER_PAGE_SIZE = 8;
    var POST_CLIENT_CACHE_KEY = 'postProcessPage_v1';
    var POST_CLIENT_CACHE_TTL_MS = 90000;
    var postLoadToken = 0;

    var settingsMenuSuffix = '';

    function postPanelSuffixList_() {
      return ['', '2', '3'];
    }

    function maxQtyForRegister_(ord) {
      if (!ord) return 0;
      var current = resolvePostCountForOrder(ord);
      var pend = pendingDeltaByOrder[String(ord._countKey || '').trim()] || 0;
      current = Math.max(0, current + pend);
      var target = Math.floor(Number(ord.quantity) || 0);
      if (target <= 0) return 999999;
      return Math.max(0, target - current);
    }

    function updateRegisterState(sfx) {
      sfx = sfx != null ? String(sfx) : '';
      var ord = getSelectedOrder('orderSelect' + sfx);
      var qtyInp = document.getElementById('qtyInput' + sfx);
      var btn = document.getElementById('btnPostSubmit' + sfx);
      var hint = document.getElementById('postRegisterHint' + sfx);
      if (!qtyInp || !btn) return;
      var maxQ = maxQtyForRegister_(ord);
      if (!ord || busy) {
        qtyInp.disabled = true;
        btn.disabled = true;
        if (hint) {
          hint.textContent = ord ? '' : '왼쪽에서 주문을 선택하세요';
          hint.classList.toggle('zero', !ord);
        }
        return;
      }
      qtyInp.disabled = false;
      if (maxQ <= 0) {
        btn.disabled = true;
        if (hint) {
          hint.textContent = '목표 수량에 도달했습니다';
          hint.classList.add('zero');
        }
        return;
      }
      var qty = parseInt(qtyInp.value, 10);
      var okQty = !isNaN(qty) && qty > 0 && qty <= maxQ;
      btn.disabled = !okQty;
      if (hint) {
        hint.textContent = '등록 가능 최대 ' + maxQ.toLocaleString() + '개';
        hint.classList.toggle('zero', false);
      }
    }

    function prefillRegisterQty_(sfx, ord) {
      sfx = sfx != null ? String(sfx) : '';
      var qtyInp = document.getElementById('qtyInput' + sfx);
      if (!qtyInp) return;
      if (!ord) {
        qtyInp.value = '';
        return;
      }
      var maxQ = maxQtyForRegister_(ord);
      if (maxQ <= 0) {
        qtyInp.value = '';
        return;
      }
      if (!qtyInp.value || parseInt(qtyInp.value, 10) <= 0) {
        qtyInp.value = String(Math.min(maxQ, 1));
      }
    }

    function closePanelSettingsMenu() {
      var menu = document.getElementById('postPanelSettingsMenu');
      if (menu) {
        menu.classList.remove('open');
        menu.setAttribute('aria-hidden', 'true');
        menu.style.top = '';
        menu.style.left = '';
        menu.style.visibility = '';
        menu.style.display = '';
      }
      settingsMenuSuffix = '';
    }

    function getNextAddablePanelSuffix_() {
      var extra2 = document.getElementById('rootMainExtra');
      var extra3 = document.getElementById('rootMainExtra3');
      if (extra2 && extra2.style.display === 'none') return '2';
      if (extra3 && extra3.style.display === 'none') return '3';
      return '';
    }

    function refreshPanelSettingsMenuItems_() {
      var menu = document.getElementById('postPanelSettingsMenu');
      if (!menu) return;
      var sfx = settingsMenuSuffix;
      var resetBtn = menu.querySelector('.js-post-menu-reset');
      var addBtn = menu.querySelector('.js-post-menu-add');
      var addDiv = menu.querySelector('.js-post-menu-add-divider');
      if (resetBtn) resetBtn.disabled = !getSelectedOrder('orderSelect' + sfx) || busy;
      var nextAdd = getNextAddablePanelSuffix_();
      if (addBtn) {
        if (nextAdd) {
          addBtn.style.display = '';
          addBtn.textContent = '입력 추가';
          addBtn.disabled = false;
        } else {
          addBtn.style.display = 'none';
        }
      }
      if (addDiv) addDiv.style.display = nextAdd ? '' : 'none';
    }

    function addNextInputPanel_() {
      var next = getNextAddablePanelSuffix_();
      if (next === '2') {
        document.getElementById('rootMainExtra').style.display = 'block';
        setActivePanelSuffix('2');
        updateDisplayForSuffix('2');
      } else if (next === '3') {
        document.getElementById('rootMainExtra3').style.display = 'block';
        setActivePanelSuffix('3');
        updateDisplayForSuffix('3');
      }
      refreshInputPanelsLayout();
      renderPostOrderCards();
    }

    function syncPanelSettingsMenuState(sfx) {
      var menu = document.getElementById('postPanelSettingsMenu');
      if (!menu || !menu.classList.contains('open')) return;
      if (String(settingsMenuSuffix) !== String(sfx != null ? sfx : '')) return;
      refreshPanelSettingsMenuItems_();
    }

    function openPanelSettingsMenu(sfx, anchorEl) {
      sfx = sfx != null ? String(sfx) : '';
      settingsMenuSuffix = sfx;
      var menu = document.getElementById('postPanelSettingsMenu');
      if (!menu || !anchorEl) return;
      refreshPanelSettingsMenuItems_();
      menu.classList.add('open');
      menu.setAttribute('aria-hidden', 'false');
      menu.style.visibility = 'hidden';
      var mw = menu.offsetWidth;
      var mh = menu.offsetHeight;
      var r = anchorEl.getBoundingClientRect();
      var top = r.top - mh - 8;
      var left = r.right - mw;
      if (top < 8) top = r.bottom + 8;
      if (left < 8) left = 8;
      if (left + mw > window.innerWidth - 8) left = window.innerWidth - mw - 8;
      menu.style.top = top + 'px';
      menu.style.left = left + 'px';
      menu.style.visibility = 'visible';
    }

    function togglePanelSettingsMenu(sfx, anchorEl) {
      var menu = document.getElementById('postPanelSettingsMenu');
      if (menu && menu.classList.contains('open') && String(settingsMenuSuffix) === String(sfx != null ? sfx : '')) {
        closePanelSettingsMenu();
        return;
      }
      closePanelSettingsMenu();
      openPanelSettingsMenu(sfx, anchorEl);
    }

    function submitPostRegister(sfx) {
      sfx = sfx != null ? String(sfx) : '';
      var ord = getSelectedOrder('orderSelect' + sfx);
      if (!ord || busy) return;
      if (flushInFlight || hasPendingDelta()) {
        setMsg('저장 중입니다. 잠시 후 다시 시도하세요.', 'err', sfx ? 'msg' + sfx : 'msg');
        return;
      }
      var qtyInp = document.getElementById('qtyInput' + sfx);
      var qty = parseInt(qtyInp ? qtyInp.value : '', 10);
      var maxQ = maxQtyForRegister_(ord);
      if (isNaN(qty) || qty <= 0) {
        setMsg('등록 수량을 입력하세요.', 'err', sfx ? 'msg' + sfx : 'msg');
        return;
      }
      if (maxQ < 999999 && qty > maxQ) {
        setMsg('잔량(' + maxQ + ')을 초과할 수 없습니다.', 'err', sfx ? 'msg' + sfx : 'msg');
        return;
      }
      var key = String(ord._countKey || '').trim();
      if (!key) return;
      busy = true;
      updateRegisterState(sfx);
      setMsg('등록 중…', '', sfx ? 'msg' + sfx : 'msg');
      google.script.run
        .withSuccessHandler(function (r) {
          busy = false;
          if (!r || !r.ok) {
            setMsg((r && r.message) ? r.message : '등록 실패', 'err', sfx ? 'msg' + sfx : 'msg');
            updateRegisterState(sfx);
            return;
          }
          var rk = String(r.orderNumber || key).trim();
          counts[rk] = Math.max(0, normalizeCountValue(r.counted));
          sessionTallyByOrder[rk] = Math.max(0, normalizeCountValue(r.todayInput));
          if (qtyInp) qtyInp.value = '';
          updateDisplay();
          var planned = Math.floor(Number(r.planned) || 0);
          setMsg(
            qty + '개 등록 · 누적 ' + r.counted + (planned > 0 ? ' / ' + planned : ''),
            'ok',
            sfx ? 'msg' + sfx : 'msg'
          );
          var inpFocus = document.getElementById('qtyInput' + sfx);
          if (inpFocus && !inpFocus.disabled) {
            prefillRegisterQty_(sfx, getSelectedOrder('orderSelect' + sfx));
            inpFocus.focus();
            inpFocus.select();
          }
          notifyOrdersDataChanged_();
        })
        .withFailureHandler(function (err) {
          busy = false;
          setMsg(err.message || String(err), 'err', sfx ? 'msg' + sfx : 'msg');
          updateRegisterState(sfx);
        })
        .postProcessAdjustCount(key, qty);
    }

    function notifyOrdersDataChanged_() {
      try {
        if (window.erpCallNotifyOrdersChanged) window.erpCallNotifyOrdersChanged();
      } catch (eNotify) {}
    }

    function ensureUiOrderKeys() {
      for (var i = 0; i < orders.length; i++) {
        var o = orders[i] || {};
        var on = String(o.orderNumber || '').trim();
        if (o._uiKey && o._countKey && o._countProductLabel) continue;
        var pn = String(o.productName || '').trim();
        var vv = String(o.version || '').trim();
        var qty = Math.floor(Number(o.quantity) || 0);
        var up = Number(o.unitPrice);
        var upStr = isFinite(up) ? String(Math.round(up)) : '0';
        var labelParts = [];
        var base = pn + (vv ? ' ' + vv : '');
        var code = String(o.productCode || '').trim();
        if (base) labelParts.push(base);
        else if (code) labelParts.push(code);
        if (code && base) labelParts.push('[' + code + ']');
        labelParts.push('수량' + qty);
        labelParts.push('단가' + upStr);
        var sr = o.sheetRow != null ? Number(o.sheetRow) : 0;
        if (sr >= 2) labelParts.push('#행' + Math.floor(sr));
        o._countProductLabel = String(o._countProductLabel || labelParts.join(' · '));
        o._uiKey = String(o._uiKey || on + '\x1e' + String(o.sheetRow != null ? o.sheetRow : i) + '\x1e' + String(i));
        o._countKey = String(o._countKey || on + '\x1f' + o._countProductLabel);
      }
    }

    /** 주문 1행별 누적 — 동일 제품명·다른 수량 행은 주문서 단독키로 합치지 않음 */
    function resolvePostCountForOrder(ord) {
      if (!ord) return 0;
      var key = String(ord._countKey || '').trim();
      if (key && counts[key] != null && counts[key] !== '') {
        return normalizeCountValue(counts[key]);
      }
      var on = String(ord.orderNumber || '').trim();
      var full = String(ord._countProductLabel || '').trim();
      if (on && full) {
        var ck = on + '\x1f' + full;
        if (counts[ck] != null && counts[ck] !== '') return normalizeCountValue(counts[ck]);
      }
      var pn = String(ord.productName || '').trim();
      if (on && pn) {
        var legacyK = on + '\x1f' + pn;
        if (counts[legacyK] != null && counts[legacyK] !== '') {
          var dupes = 0;
          for (var i = 0; i < orders.length; i++) {
            var o2 = orders[i] || {};
            if (String(o2.orderNumber || '').trim() === on && String(o2.productName || '').trim() === pn) dupes++;
          }
          if (dupes <= 1) return normalizeCountValue(counts[legacyK]);
        }
      }
      if (on && (!full || key.indexOf('\x1f') < 0)) {
        if (counts[on] != null && counts[on] !== '') return normalizeCountValue(counts[on]);
      }
      return 0;
    }

    function findOrderForJournalItem(it) {
      var on = String(it.orderNo || '').trim();
      var prod = String(it.product || '').trim();
      if (!on) return null;
      var exact = null;
      var legacy = null;
      var legacyN = 0;
      for (var i = 0; i < orders.length; i++) {
        var ord = orders[i] || {};
        if (String(ord.orderNumber || '').trim() !== on) continue;
        var full = String(ord._countProductLabel || '').trim();
        if (prod && (prod === full || prod === String(ord._countKey || '').split('\x1f')[1])) {
          exact = ord;
          break;
        }
        var pn = String(ord.productName || '').trim();
        if (prod && pn === prod) {
          legacy = ord;
          legacyN++;
        }
      }
      if (exact) return exact;
      if (legacyN === 1) return legacy;
      return null;
    }

    function normalizeCountValue(v) {
      var n = typeof v === 'number' ? v : parseInt(v, 10);
      if (isNaN(n)) n = 0;
      return Math.max(0, n);
    }

    function hasPendingDelta() {
      for (var k in pendingDeltaByOrder) {
        if (!Object.prototype.hasOwnProperty.call(pendingDeltaByOrder, k)) continue;
        if ((pendingDeltaByOrder[k] || 0) !== 0) return true;
      }
      return false;
    }

    function scheduleFlushPending(delayMs) {
      if (flushTimer) clearTimeout(flushTimer);
      flushTimer = setTimeout(flushPendingAdjusts, delayMs == null ? 120 : delayMs);
    }

    function flushPendingAdjusts() {
      // 저장 RPC가 끝나기 전에 타이머가 돌면 여기서 그냥 return 하면 pending이 서버로 안 나가고,
      // 이후 success에서 r.counted만 반영되며 숫자가 '롤백'된 것처럼 보임 → 반드시 재시도 예약
      if (flushInFlight || busy) {
        scheduleFlushPending(busy ? 400 : 180);
        return;
      }
      var key = '';
      for (var k in pendingDeltaByOrder) {
        if (!Object.prototype.hasOwnProperty.call(pendingDeltaByOrder, k)) continue;
        if ((pendingDeltaByOrder[k] || 0) !== 0) {
          key = k;
          break;
        }
      }
      if (!key) return;
      var sendDelta = pendingDeltaByOrder[key] || 0;
      delete pendingDeltaByOrder[key];
      if (!sendDelta) return;
      flushInFlight = true;
      google.script.run
        .withSuccessHandler(function (r) {
          flushInFlight = false;
          if (!r || !r.ok) {
            pendingDeltaByOrder[key] = (pendingDeltaByOrder[key] || 0) + sendDelta;
            sessionTallyByOrder[key] = Math.max(0, (sessionTallyByOrder[key] || 0) - sendDelta);
            setMsg((r && r.message) ? r.message : '저장 지연 · 재시도 중', 'err');
            scheduleFlushPending(1200);
            return;
          }
          var okKey = String(r.orderNumber || key).trim();
          var remain = pendingDeltaByOrder[okKey] || 0;
          counts[okKey] = Math.max(0, normalizeCountValue(r.counted) + remain);
          sessionTallyByOrder[okKey] = Math.max(0, normalizeCountValue(r.todayInput) + remain);
          updateDisplay();
          if (!hasPendingDelta()) {
            setMsg('저장 완료', 'ok');
            notifyOrdersDataChanged_();
          } else scheduleFlushPending(0);
        })
        .withFailureHandler(function () {
          flushInFlight = false;
          pendingDeltaByOrder[key] = (pendingDeltaByOrder[key] || 0) + sendDelta;
          sessionTallyByOrder[key] = Math.max(0, (sessionTallyByOrder[key] || 0) - sendDelta);
          setMsg('네트워크 지연 · 재시도 중', 'err');
          scheduleFlushPending(1500);
        })
        .postProcessAdjustCount(key, sendDelta);
    }

    function formatModel(ord) {
      if (!ord) return '—';
      var pn = String(ord.productName || '').trim();
      var v = String(ord.version || '').trim();
      if (pn && v) return pn + ' (' + v + ')';
      return pn || v || '—';
    }

    function postProductKindMeta(ord) {
      ord = ord || {};
      var label = String(ord.postProcessKindLabel || '').trim();
      var kind = String(ord.postProcessKind || '').trim();
      if (!label) {
        if (ord.detailInfo && ord.detailInfo.source === 'combo-bom') {
          kind = 'finished';
          label = '완제품';
        } else {
          kind = 'semi';
          label = '반제품';
        }
      }
      var cls = kind === 'finished' ? 'post-product-badge-finished' : 'post-product-badge-semi';
      return { label: label, cls: cls };
    }

    function setMsg(text, kind, msgId) {
      var el = document.getElementById(msgId || 'msg');
      if (!el) return;
      el.textContent = text || '';
      el.className = 'msg' + (kind === 'err' ? ' err' : kind === 'ok' ? ' ok' : '');
    }

    function setViewMode(mode) {
      var isPlan = mode === 'plan';
      var vInput = document.getElementById('viewInput');
      var vPlan = document.getElementById('viewPlan');
      var tInput = document.getElementById('tabInput');
      var tPlan = document.getElementById('tabPlan');
      if (vInput) vInput.style.display = isPlan ? 'none' : '';
      if (vPlan) vPlan.style.display = isPlan ? '' : 'none';
      if (tInput) tInput.classList.toggle('active', !isPlan);
      if (tPlan) tPlan.classList.toggle('active', isPlan);
      if (isPlan) ensurePostPlanWidget();
    }

    var postPlanWidget = null;
    function ensurePostPlanWidget() {
      if (!postPlanWidget && window.initScopedPlanCalendar) {
        postPlanWidget = window.initScopedPlanCalendar({ rootId: 'postPlanRoot', scope: 'post', mode: 'history' });
      } else if (postPlanWidget && postPlanWidget.ensure) {
        postPlanWidget.ensure();
      }
    }

    function getSelectedOrder(selectId) {
      var hidden = document.getElementById(selectId || 'orderSelect');
      var v = hidden ? hidden.value : '';
      if (!v) return null;
      for (var i = 0; i < orders.length; i++) {
        if (orders[i] && String(orders[i]._uiKey || '') === v) return orders[i];
      }
      return null;
    }

    function hasSelectedOrder(selectId) {
      var hidden = document.getElementById(selectId || 'orderSelect');
      return !!(hidden && hidden.value);
    }

    function applyWorkPanelProductKind_(sfx, ord) {
      var el = document.getElementById('dispProductKind' + sfx);
      if (!el) return;
      if (!ord) {
        el.textContent = '';
        el.className = 'post-work-kind-badge is-empty';
        return;
      }
      var meta = postProductKindMeta(ord);
      el.textContent = meta.label;
      el.className =
        'post-work-kind-badge ' + (meta.cls.indexOf('finished') >= 0 ? 'kind-finished' : 'kind-semi');
    }

    function updateDisplayForSuffix(sfx) {
      sfx = sfx || '';
      var ord = getSelectedOrder('orderSelect' + sfx);
      var hasOrder = hasSelectedOrder('orderSelect' + sfx);
      var progressWrap = document.getElementById('progressWrap' + sfx);
      var progressFill = document.getElementById('progressFill' + sfx);
      var progressPct = document.getElementById('progressPctLabel' + sfx);

      var prodNameEl = document.getElementById('dispProductName' + sfx);
      var orderNumEl = document.getElementById('dispOrderNum' + sfx);

      if (!ord) {
        prefillRegisterQty_(sfx, null);
        document.getElementById('dispOrderNo' + sfx).textContent = '—';
        if (orderNumEl) orderNumEl.textContent = '—';
        if (prodNameEl) {
          prodNameEl.textContent = '주문을 선택하세요';
          prodNameEl.classList.add('is-empty');
        }
        applyWorkPanelProductKind_(sfx, null);
        document.getElementById('dispTotalQty' + sfx).textContent = '0';
        document.getElementById('dispCumulative' + sfx).textContent = '0';
        document.getElementById('dispRatio' + sfx).textContent = '';
        document.getElementById('dispWarn' + sfx).style.display = 'none';
        if (progressWrap) progressWrap.style.display = 'none';
        if (progressFill) {
          progressFill.style.width = '0%';
          progressFill.classList.remove('is-over', 'is-full');
          progressFill.setAttribute('aria-valuenow', '0');
        }
        if (progressPct) progressPct.textContent = '0%';
        updatePostPanelOrderLabel(sfx);
        syncPanelSettingsMenuState(sfx);
        updateRegisterState(sfx);
        return;
      }

      var key = String(ord._countKey || '').trim();
      var sb = resolvePostCountForOrder(ord);
      var pend = pendingDeltaByOrder[key] || 0;
      var ratioTotal = Math.max(0, sb + pend);
      var pq = ord.quantity != null && ord.quantity !== '' ? Number(ord.quantity) : 0;
      var pqOk = !isNaN(pq) && pq > 0;
      var atOrOverGoal = pqOk && ratioTotal >= pq;
      var totalQtyFloor = pqOk ? Math.floor(pq) : 0;

      syncPanelSettingsMenuState(sfx);

      document.getElementById('dispOrderNo' + sfx).textContent = String(ord.customer || '').trim() || '—';
      if (orderNumEl) orderNumEl.textContent = String(ord.orderNumber || '').trim() || '—';
      if (prodNameEl) {
        prodNameEl.textContent = formatModel(ord);
        prodNameEl.classList.remove('is-empty');
      }
      applyWorkPanelProductKind_(sfx, ord);
      document.getElementById('dispTotalQty' + sfx).textContent = String(totalQtyFloor);
      document.getElementById('dispCumulative' + sfx).textContent = String(ratioTotal);

      var warn = document.getElementById('dispWarn' + sfx);
      if (pqOk) {
        if (ratioTotal >= pq) {
          warn.style.display = 'block';
          warn.textContent = ratioTotal > pq ? '목표 수량을 초과했습니다.' : '목표 수량에 도달했습니다.';
        } else {
          warn.style.display = 'none';
        }
        var pctRaw = Math.round((ratioTotal / pq) * 1000) / 10;
        var barW = Math.min(100, Math.round((ratioTotal / pq) * 10000) / 100);
        if (progressWrap) {
          progressWrap.style.display = 'block';
          progressWrap.setAttribute('aria-hidden', 'false');
        }
        if (progressPct) progressPct.textContent = pctRaw + '%';
        if (progressFill) {
          progressFill.style.width = barW + '%';
          progressFill.classList.toggle('is-over', ratioTotal > pq);
          progressFill.classList.toggle('is-full', ratioTotal >= pq && ratioTotal <= pq);
          progressFill.setAttribute('aria-valuenow', String(Math.min(100, Math.round(barW))));
        }
      } else {
        warn.style.display = 'none';
        if (progressWrap) {
          progressWrap.style.display = 'none';
          progressWrap.setAttribute('aria-hidden', 'true');
        }
        if (progressFill) {
          progressFill.style.width = '0%';
          progressFill.classList.remove('is-over', 'is-full');
        }
        if (progressPct) progressPct.textContent = '—';
      }
      updatePostPanelOrderLabel(sfx);
      prefillRegisterQty_(sfx, ord);
      updateRegisterState(sfx);
    }

    function updateDisplay() {
      renderPostOrderCards();
      updateDisplayForSuffix('');
      var extra2 = document.getElementById('rootMainExtra');
      if (extra2 && extra2.style.display !== 'none') updateDisplayForSuffix('2');
      var extra3 = document.getElementById('rootMainExtra3');
      if (extra3 && extra3.style.display !== 'none') updateDisplayForSuffix('3');
    }

    function refreshInputPanelsLayout() {
      var p = document.getElementById('inputPanels');
      var visibleCount = 1;
      var extra2 = document.getElementById('rootMainExtra');
      var extra3 = document.getElementById('rootMainExtra3');
      if (extra2 && extra2.style.display !== 'none') visibleCount++;
      if (extra3 && extra3.style.display !== 'none') visibleCount++;
      if (p) {
        p.classList.remove('two-cols', 'three-cols');
        if (visibleCount >= 3) p.classList.add('three-cols');
        else if (visibleCount >= 2) p.classList.add('two-cols');
      }
    }

    function ordersMatchingFilter(searchId) {
      var inp = document.getElementById(searchId || 'orderSearchFilter');
      var q = inp && inp.value ? String(inp.value).trim().toLowerCase() : '';
      if (!q) return orders.slice();
      return orders.filter(function (O) {
        if (!O) return false;
        var on = String(O.orderNumber || '').toLowerCase();
        var cu = String(O.customer || '').toLowerCase();
        var pn = String(O.productName || '').toLowerCase();
        var pd = String(O.postProcessLabel || O.postProcessDisplayName || '').toLowerCase();
        var pc = String(O.productCode || '').toLowerCase();
        return (
          on.indexOf(q) >= 0 ||
          cu.indexOf(q) >= 0 ||
          pn.indexOf(q) >= 0 ||
          (pd && pd.indexOf(q) >= 0) ||
          pc.indexOf(q) >= 0
        );
      });
    }

    function postNum(n) {
      var x = Math.floor(Number(n) || 0);
      return x.toLocaleString('ko-KR');
    }

    function getActivePanelSuffix() {
      return activePanelSuffix != null ? String(activePanelSuffix) : '';
    }

    function panelLabelForSuffix(sfx) {
      if (sfx === '2') return '입력 2';
      if (sfx === '3') return '입력 3';
      return '입력 1';
    }

    function setActivePanelSuffix(sfx) {
      sfx = sfx != null ? String(sfx) : '';
      if (sfx !== '' && sfx !== '2' && sfx !== '3') sfx = '';
      var panelEl =
        sfx === '2'
          ? document.getElementById('rootMainExtra')
          : sfx === '3'
            ? document.getElementById('rootMainExtra3')
            : document.getElementById('rootMain');
      if (panelEl && panelEl.style.display === 'none' && sfx !== '') {
        sfx = '';
      }
      activePanelSuffix = sfx;
      var panels = document.querySelectorAll('.post-input-panel');
      for (var i = 0; i < panels.length; i++) {
        var p = panels[i];
        var ps = p.getAttribute('data-panel-suffix') || '';
        p.classList.toggle('is-active', ps === activePanelSuffix);
      }
      var hint = document.getElementById('postActivePanelHint');
      if (hint) hint.textContent = panelLabelForSuffix(activePanelSuffix);
    }

    function updatePostPanelOrderLabel(sfx) {
      sfx = sfx != null ? String(sfx) : '';
      var el = document.getElementById('postPanelOrderLabel' + sfx);
      if (!el) return;
      var ord = getSelectedOrder('orderSelect' + sfx);
      el.textContent = ord ? formatModel(ord) : '— 주문 미선택 —';
    }

    function updatePostOrderPager_(filteredLen) {
      var pager = document.getElementById('postOrderPager');
      var prevBtn = document.getElementById('postOrderPagerPrev');
      var nextBtn = document.getElementById('postOrderPagerNext');
      var infoEl = document.getElementById('postOrderPagerInfo');
      if (!pager || !prevBtn || !nextBtn || !infoEl) return;
      var len = Math.max(0, Math.floor(Number(filteredLen) || 0));
      var totalPages = Math.max(1, Math.ceil(len / POST_ORDER_PAGE_SIZE));
      if (postOrderCardPage > totalPages) postOrderCardPage = totalPages;
      if (postOrderCardPage < 1) postOrderCardPage = 1;
      if (len <= POST_ORDER_PAGE_SIZE) {
        pager.classList.remove('is-visible');
        return;
      }
      pager.classList.add('is-visible');
      infoEl.textContent = postOrderCardPage + ' / ' + totalPages + ' · ' + len + '건';
      prevBtn.disabled = postOrderCardPage <= 1;
      nextBtn.disabled = postOrderCardPage >= totalPages;
    }

    function renderPostOrderCards() {
      var listEl = document.getElementById('postOrderCardList');
      if (!listEl) return;
      var filtered = ordersMatchingFilter('orderSearchFilter');
      var sfxList = ['', '2', '3'];
      var si;
      for (si = 0; si < sfxList.length; si++) {
        var sfxP = sfxList[si];
        var panelP =
          sfxP === '2'
            ? document.getElementById('rootMainExtra')
            : sfxP === '3'
              ? document.getElementById('rootMainExtra3')
              : document.getElementById('rootMain');
        if (panelP && panelP.style.display === 'none') continue;
        var hiddenP = document.getElementById('orderSelect' + sfxP);
        if (!hiddenP || !hiddenP.value) continue;
        var keepP = filtered.some(function (x) {
          return String(x._uiKey || '') === String(hiddenP.value);
        });
        if (!keepP) {
          hiddenP.value = '';
          updatePostPanelOrderLabel(sfxP);
        }
      }
      if (!filtered.length) {
        listEl.innerHTML =
          '<div class="post-order-empty">' +
          (orders.length ? '검색 결과 없음' : '표시할 주문이 없습니다') +
          '</div>';
        updatePostOrderPager_(0);
        return;
      }
      var totalPages = Math.max(1, Math.ceil(filtered.length / POST_ORDER_PAGE_SIZE));
      if (postOrderCardPage > totalPages) postOrderCardPage = totalPages;
      var startIdx = (postOrderCardPage - 1) * POST_ORDER_PAGE_SIZE;
      var pageItems = filtered.slice(startIdx, startIdx + POST_ORDER_PAGE_SIZE);
      var activeSfx = getActivePanelSuffix();
      var hidden = document.getElementById('orderSelect' + activeSfx);
      var activeKey = hidden ? String(hidden.value || '') : '';
      var html = '';
      var i;
      for (i = 0; i < pageItems.length; i++) {
        var O = pageItems[i] || {};
        var v = String(O._uiKey || '');
        var stCls = postOrderOptionClass(O);
        var selCls = activeKey && activeKey === v ? ' selected' : '';
        var total = Math.max(0, Math.floor(Number(O.quantity) || 0));
        var cust = String(O.customer || '').trim() || '—';
        var oNum = String(O.orderNumber || '').trim() || '—';
        var pnm = formatModel(O);
        html +=
          '<div class="post-order-card ' +
          stCls +
          selCls +
          '" data-ui-key="' +
          esc(v) +
          '" role="button" tabindex="0">' +
          '<div class="post-order-customer">' +
          esc(postOrderOptionPrefix(O) + ' ' + cust) +
          '</div>' +
          '<div class="post-order-info">' +
          '<div class="post-order-info-row"><span class="post-order-info-k">주문</span><span class="post-order-info-v">' +
          esc(oNum) +
          '</span></div>' +
          '<div class="post-order-info-row"><span class="post-order-info-k">제품</span><span class="post-order-info-v is-product">' +
          esc(pnm) +
          '</span></div>' +
          '<div class="post-order-info-row"><span class="post-order-info-k">수량</span><span class="post-order-info-v is-qty">' +
          esc(total > 0 ? postNum(total) : '—') +
          '</span></div>' +
          '</div></div>';
      }
      listEl.innerHTML = html;
      updatePostOrderPager_(filtered.length);
    }

    function selectIdToSuffix(selectId) {
      if (selectId === 'orderSelect2') return '2';
      if (selectId === 'orderSelect3') return '3';
      return '';
    }

    function postOrderEffectiveCount(ord) {
      if (!ord) return 0;
      var key = String(ord._countKey || '').trim();
      var base = resolvePostCountForOrder(ord);
      var pend = key ? (pendingDeltaByOrder[key] || 0) : 0;
      return Math.max(0, base + pend);
    }

    function buildPostOrderOptionLabel(O) {
      O = O || {};
      var pnm = String(O.productName || '').trim();
      var vv = String(O.version || '').trim();
      var cust = String(O.customer || '').trim();
      var oNum = String(O.orderNumber || '').trim();
      var label = (oNum || '—') + ' · ' + (cust || '—') + ' · ' + pnm;
      if (vv) label += ' v' + vv;
      return label;
    }

    function buildPostOrderQtyBadge(O) {
      O = O || {};
      var total = Math.max(0, Math.floor(Number(O.quantity) || 0));
      var cum = postOrderEffectiveCount(O);
      var st = postOrderOptionState(O);
      if (st === 'full') return (cum > 0 ? cum : total) + '개 완료';
      if (st === 'progress') {
        if (total > 0) return cum + '/' + total + '개';
        return cum + '개 진행중';
      }
      if (total > 0) return total + '개';
      return '';
    }

    function postOrderOptionState(ord) {
      ord = ord || {};
      var total = Math.max(0, Math.floor(Number(ord.quantity) || 0));
      var cum = postOrderEffectiveCount(ord);
      if (cum <= 0) return 'none';
      if (total > 0 && cum >= total) return 'full';
      return 'progress';
    }

    function postOrderOptionClass(ord) {
      var st = postOrderOptionState(ord);
      if (st === 'full') return 'st-full';
      if (st === 'progress') return 'st-progress';
      return 'st-none';
    }

    function postOrderOptionPrefix(ord) {
      var st = postOrderOptionState(ord);
      if (st === 'full') return '●';
      if (st === 'progress') return '◐';
      return '○';
    }

    function setPostOrderSelection(selectId, uiKey) {
      var hidden = document.getElementById(selectId);
      if (!hidden) return;
      hidden.value = uiKey || '';
      if (uiKey) {
        var filteredSel = ordersMatchingFilter('orderSearchFilter');
        var fi;
        for (fi = 0; fi < filteredSel.length; fi++) {
          if (String(filteredSel[fi]._uiKey || '') === String(uiKey)) {
            postOrderCardPage = Math.floor(fi / POST_ORDER_PAGE_SIZE) + 1;
            break;
          }
        }
      }
      var sfx = selectIdToSuffix(selectId);
      updatePostPanelOrderLabel(sfx);
      renderPostOrderCards();
    }

    function readPostClientCache_() {
      try {
        var raw = sessionStorage.getItem(POST_CLIENT_CACHE_KEY);
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        if (!parsed || !parsed.res || !parsed.savedAt) return null;
        if (Date.now() - Number(parsed.savedAt) > POST_CLIENT_CACHE_TTL_MS) return null;
        return parsed.res;
      } catch (eRead) {
        return null;
      }
    }

    function writePostClientCache_(res) {
      try {
        if (!res || !res.ok) return;
        sessionStorage.setItem(POST_CLIENT_CACHE_KEY, JSON.stringify({ res: res, savedAt: Date.now() }));
      } catch (eWrite) {}
    }

    function applyPostPageData_(res, fullReset) {
      document.getElementById('rootLoading').style.display = 'none';
      var layoutEl = document.getElementById('postInputLayout');
      if (layoutEl) layoutEl.style.display = '';
      if (!res || !res.ok) {
        if (fullReset) {
          setMsg((res && res.error) ? res.error : '불러오지 못했습니다.', 'err');
          orders = [];
          counts = {};
          sessionTallyByOrder = {};
          var sfE = document.getElementById('orderSearchFilter');
          if (sfE) sfE.value = '';
          renderPostOrderCards();
          updateDisplayForSuffix('');
          updateDisplayForSuffix('2');
          updateDisplayForSuffix('3');
        }
        return;
      }
      orders = res.orders || [];
      ensureUiOrderKeys();
      counts = res.counts || {};
      if (res.dailyInputs) sessionTallyByOrder = res.dailyInputs;
      if (fullReset) {
        var sf = document.getElementById('orderSearchFilter');
        if (sf) sf.value = '';
        setActivePanelSuffix('');
      }
      renderPostOrderCards();
      updateDisplayForSuffix('');
      updateDisplayForSuffix('2');
      updateDisplayForSuffix('3');
    }

    function loadData() {
      setMsg('');
      sessionTallyByOrder = {};
      pendingDeltaByOrder = {};
      if (flushTimer) clearTimeout(flushTimer);
      flushTimer = null;
      flushInFlight = false;
      refreshPostOrdersFromServer_(true);
    }

    function refreshPostOrdersFromServer_(fullReset, opts) {
      opts = opts || {};
      var token = ++postLoadToken;
      if (!opts.skipCache) {
        var cached = readPostClientCache_();
        if (cached && cached.ok) {
          applyPostPageData_(cached, fullReset);
        } else {
          document.getElementById('rootLoading').style.display = 'block';
          var layoutHide = document.getElementById('postInputLayout');
          if (layoutHide) layoutHide.style.display = 'none';
        }
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (token !== postLoadToken) return;
          applyPostPageData_(res, fullReset);
          if (res && res.ok) writePostClientCache_(res);
          if (window.erpMarkOrdersRevisionSeen) window.erpMarkOrdersRevisionSeen();
        })
        .withFailureHandler(function (err) {
          if (token !== postLoadToken) return;
          document.getElementById('rootLoading').style.display = 'none';
          var layoutEl = document.getElementById('postInputLayout');
          if (layoutEl) layoutEl.style.display = '';
          if (fullReset && !orders.length) setMsg(err.message || String(err), 'err');
        })
        .getPostProcessPageData();
    }

    window.erpRefreshForOrdersChange = function () {
      if (hasPendingDelta() || flushInFlight) return;
      refreshPostOrdersFromServer_(false, { skipCache: true });
    };

    function runReset(sfx) {
      sfx = sfx || '';
      var ord = getSelectedOrder('orderSelect' + sfx);
      if (!ord || busy) return;
      if (flushInFlight || hasPendingDelta()) {
        setMsg('저장 중입니다. 잠시 후 다시 시도하세요.', 'err', sfx ? 'msg' + sfx : 'msg');
        return;
      }
      if (!window.confirm('이 주문서의 누적 수량을 0으로 초기화할까요?')) return;
      busy = true;
      updateDisplayForSuffix(sfx);
      setMsg('', '', sfx ? 'msg' + sfx : 'msg');
      google.script.run
        .withSuccessHandler(function (r) {
          busy = false;
          if (!r || !r.ok) {
            setMsg((r && r.message) ? r.message : '초기화 실패', 'err', sfx ? 'msg' + sfx : 'msg');
            updateDisplayForSuffix(sfx);
            return;
          }
          var rk = String(r.orderNumber);
          counts[rk] = normalizeCountValue(r.counted);
          sessionTallyByOrder[rk] = 0;
          updateDisplayForSuffix(sfx);
          setMsg('초기화했습니다.', 'ok', sfx ? 'msg' + sfx : 'msg');
          notifyOrdersDataChanged_();
        })
        .withFailureHandler(function (err) {
          busy = false;
          setMsg(err.message || String(err), 'err', sfx ? 'msg' + sfx : 'msg');
          updateDisplayForSuffix(sfx);
        })
        .postProcessResetCount(String(ord._countKey || '').trim());
    }

    function esc(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    var postOrderCardListEl = document.getElementById('postOrderCardList');
    if (postOrderCardListEl) {
      postOrderCardListEl.addEventListener('click', function (ev) {
        var card = ev.target && ev.target.closest ? ev.target.closest('.post-order-card[data-ui-key]') : null;
        if (!card) return;
        var uiKey = card.getAttribute('data-ui-key') || '';
        var sfx = getActivePanelSuffix();
        setPostOrderSelection('orderSelect' + sfx, uiKey);
        setMsg('', '', sfx ? 'msg' + sfx : 'msg');
        updateDisplayForSuffix(sfx);
        var qtyEl = document.getElementById('qtyInput' + sfx);
        if (qtyEl && !qtyEl.disabled) {
          setTimeout(function () {
            qtyEl.focus();
            qtyEl.select();
          }, 30);
        }
      });
    }
    var inputPanelsEl = document.getElementById('inputPanels');
    if (inputPanelsEl) {
      inputPanelsEl.addEventListener('click', function (ev) {
        var settingsBtn = ev.target && ev.target.closest ? ev.target.closest('.js-post-panel-settings') : null;
        if (settingsBtn) {
          ev.preventDefault();
          ev.stopPropagation();
          var sfxSet = settingsBtn.getAttribute('data-panel-suffix') || '';
          setActivePanelSuffix(sfxSet);
          renderPostOrderCards();
          togglePanelSettingsMenu(sfxSet, settingsBtn);
          return;
        }
        if (ev.target && ev.target.closest && ev.target.closest('button')) return;
        var panel = ev.target && ev.target.closest ? ev.target.closest('.post-input-panel[data-panel-suffix]') : null;
        if (!panel || panel.style.display === 'none') return;
        setActivePanelSuffix(panel.getAttribute('data-panel-suffix') || '');
        renderPostOrderCards();
      });
    }
    document.addEventListener('click', function (ev) {
      var menu = document.getElementById('postPanelSettingsMenu');
      if (!menu || !menu.classList.contains('open')) return;
      if (ev.target && ev.target.closest && ev.target.closest('.js-post-panel-settings')) return;
      if (ev.target && ev.target.closest && ev.target.closest('#postPanelSettingsMenu')) return;
      closePanelSettingsMenu();
    });
    document.addEventListener('keydown', function (ev) {
      if (ev.key === 'Escape') closePanelSettingsMenu();
    });
    var postPanelSettingsMenu = document.getElementById('postPanelSettingsMenu');
    if (postPanelSettingsMenu) {
      postPanelSettingsMenu.addEventListener('click', function (ev) {
        ev.stopPropagation();
        var resetItem = ev.target && ev.target.closest ? ev.target.closest('.js-post-menu-reset') : null;
        var addItem = ev.target && ev.target.closest ? ev.target.closest('.js-post-menu-add') : null;
        var sfxMenu = settingsMenuSuffix;
        if (resetItem && !resetItem.disabled) {
          closePanelSettingsMenu();
          runReset(sfxMenu);
          return;
        }
        if (addItem && !addItem.disabled) {
          closePanelSettingsMenu();
          addNextInputPanel_();
        }
      });
    }
    var orderSearchEl = document.getElementById('orderSearchFilter');
    if (orderSearchEl) {
      orderSearchEl.addEventListener('input', function () {
        postOrderCardPage = 1;
        renderPostOrderCards();
      });
    }
    var postOrderPagerPrev = document.getElementById('postOrderPagerPrev');
    var postOrderPagerNext = document.getElementById('postOrderPagerNext');
    if (postOrderPagerPrev) {
      postOrderPagerPrev.addEventListener('click', function () {
        if (postOrderCardPage <= 1) return;
        postOrderCardPage--;
        renderPostOrderCards();
      });
    }
    if (postOrderPagerNext) {
      postOrderPagerNext.addEventListener('click', function () {
        postOrderCardPage++;
        renderPostOrderCards();
      });
    }
    function wirePostRegisterPanel_(sfx) {
      var qtyInp = document.getElementById('qtyInput' + sfx);
      var btn = document.getElementById('btnPostSubmit' + sfx);
      if (qtyInp) {
        qtyInp.addEventListener('input', function () {
          updateRegisterState(sfx);
        });
        qtyInp.addEventListener('keydown', function (ev) {
          if (ev.key === 'Enter') {
            ev.preventDefault();
            var btnGo = document.getElementById('btnPostSubmit' + sfx);
            if (btnGo && !btnGo.disabled) submitPostRegister(sfx);
          }
        });
      }
      if (btn) {
        btn.addEventListener('click', function () {
          submitPostRegister(sfx);
        });
      }
    }
    wirePostRegisterPanel_('');
    wirePostRegisterPanel_('2');
    wirePostRegisterPanel_('3');
    document.getElementById('tabInput').addEventListener('click', function () { setViewMode('input'); });
    document.getElementById('tabPlan').addEventListener('click', function () { setViewMode('plan'); });
    document.getElementById('btnCloseInput2').addEventListener('click', function () {
      document.getElementById('rootMainExtra').style.display = 'none';
      setPostOrderSelection('orderSelect2', '');
      setMsg('', '', 'msg2');
      if (getActivePanelSuffix() === '2') setActivePanelSuffix('');
      updateDisplayForSuffix('2');
      refreshInputPanelsLayout();
      renderPostOrderCards();
    });
    document.getElementById('btnCloseInput3').addEventListener('click', function () {
      document.getElementById('rootMainExtra3').style.display = 'none';
      setPostOrderSelection('orderSelect3', '');
      setMsg('', '', 'msg3');
      if (getActivePanelSuffix() === '3') setActivePanelSuffix('');
      updateDisplayForSuffix('3');
      refreshInputPanelsLayout();
      renderPostOrderCards();
    });
    window.addEventListener('load', function () {
      setActivePanelSuffix('');
      loadData();
      setViewMode('input');
      updateDisplayForSuffix('2');
      updateDisplayForSuffix('3');
      refreshInputPanelsLayout();
    });
  </script>
</body>
</html>
